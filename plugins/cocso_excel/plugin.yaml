name: cocso_excel
version: 1.0.0
description: >
  Excel (.xlsx) 파일 읽기/쓰기 도구. 비즈니스사가 정산표·거래처
  리스트·수수료 시트 같은 엑셀 파일을 자연어로 다룰 수 있게 함.
  openpyxl 기반. 6개 tool 제공: open / read_range / write_cell /
  write_range / add_sheet / save_as.
author: COCSO
provides_tools:
  - excel_open
  - excel_read_range
  - excel_write_cell
  - excel_write_range
  - excel_add_sheet
  - excel_save_as
