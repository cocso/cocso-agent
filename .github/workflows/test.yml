# Run pytest on every push and PR.
#
# Verifies:
#   - All bundled plugin tests (sandbox / audit / excel / settlement /
#     sniff / validate / mcp_inventory / combined)
#   - MCP dual auto-registration tests
#   - Subagent tests (delegate_task)
#
# Caches pip + tests for speed. Targets Python 3.13 (matches Dockerfile +
# pyproject `requires-python = ">=3.11"`).

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install openpyxl   # bundled plugin dep

      - name: Verify imports
        run: |
          python -c "import tools.delegate_tool"
          python -c "from cocso_cli.config import DEFAULT_CONFIG; assert 'cocso_plugin' in DEFAULT_CONFIG['plugins']['enabled']"
          python -c "from plugins.cocso_plugin import sandbox, audit, excel, settlement, settlement_sniff, mcp_inventory"

      - name: Run pytest
        run: |
          python -m pytest -p no:xdist -o addopts="" tests/plugins/ tests/tools/test_cocso_mcp_dual.py -v

      - name: Lint (non-blocking)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check plugins/ cocso_cli/ tools/ --output-format=github || true
